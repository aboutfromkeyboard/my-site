<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Анна Иванова | Фотограф</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ШАПКА -->
    <header class="header">
        <div class="container">
            <div class="logo">📷 Анна Иванова</div>
            <nav class="nav">
                <a href="#">Главная</a>
                <a href="#gallery">Портфолио</a>
                <a href="#contact">Контакты</a>
            </nav>
        </div>
    </header>

    <!-- ГЕРОЙ (большое фото) -->
    <section class="hero">
        <div class="hero-overlay">
            <h1>Анна Иванова</h1>
            <p>Фотограф, который видит красоту в деталях</p>
            <a href="#gallery" class="btn-primary">Смотреть работы</a>
        </div>
    </section>

    <!-- ГАЛЕРЕЯ (сетка с портфолио) -->
    <section id="gallery" class="gallery">
        <div class="container">
            <h2>Мои работы</h2>
            <div class="gallery-grid">
                <div class="gallery-item"><img src="https://picsum.photos/id/1015/400/300" alt="Фото 1" /></div>
                <div class="gallery-item"><img src="https://picsum.photos/id/1018/400/300" alt="Фото 2" /></div>
                <div class="gallery-item"><img src="https://picsum.photos/id/1019/400/300" alt="Фото 3" /></div>
                <div class="gallery-item"><img src="https://picsum.photos/id/1020/400/300" alt="Фото 4" /></div>
                <div class="gallery-item"><img src="https://picsum.photos/id/1021/400/300" alt="Фото 5" /></div>
                <div class="gallery-item"><img src="https://picsum.photos/id/1022/400/300" alt="Фото 6" /></div>
            </div>
        </div>
    </section>

    <!-- КОНТАКТЫ -->
    <section id="contact" class="contact">
        <div class="container">
            <h2>Свяжитесь со мной</h2>
            <p>📧 anna@photo.ru</p>
            <p>📱 +7 (999) 123-45-67</p>
            <a href="https://t.me/твой_ник" class="btn-primary">Написать в Telegram</a>
        </div>
    </section>

    <script src="script.js" defer></script>
</body>
</html>
