<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Алексей | Наставник в IT</title>
    
    <!-- Подключаем шрифт -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <!-- Параллельная загрузка CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="card">
        <div class="avatar-wrapper">
            <img class="avatar" src="https://i.pravatar.cc/300?img=12" alt="Аватар" />
        </div>
        
        <h1>Алексей</h1>
        <div class="badge">🚀 Наставник для начинающих</div>
        
        <ul class="superpowers">
            <li>🧠 Перевожу с "компьютерного" на человеческий</li>
            <li>🚀 Помогаю запустить первый проект за вечер</li>
            <li>❤️ Отвечаю на вопросы, даже глупые</li>
        </ul>
        
        <a href="https://t.me/твой_ник" class="btn-primary">
            💬 Написать в Telegram
        </a>
        
        <hr class="divider" />
        
        <form id="contactForm">
            <div class="form-group">
                <label for="name">Имя</label>
                <input type="text" id="name" placeholder="Как к вам обращаться?" required />
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="example@mail.ru" required />
            </div>
            <button type="submit" class="btn-secondary">
                📩 Получить чек-лист
            </button>
        </form>
        
        <div class="footer">
            🔒 Никакого спама. Только полезные материалы.
        </div>
    </div>
    
    <!-- Параллельная загрузка JS -->
    <script src="script.js" defer></script>
</body>
</html>
